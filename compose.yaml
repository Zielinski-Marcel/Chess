services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        ports:
            - "10000:10000"
        environment:
            APP_NAME: "Chess Engine"
            APP_ENV: local
            APP_KEY: base64:bL0+k9IThxt0lAqrDvWkf0FPYRdljhmxtImHwqnf3pw=
            APP_DEBUG: "true"
            APP_URL: http://localhost:10000

            DB_CONNECTION: pgsql
            DB_HOST: db
            DB_PORT: 5432
            DB_DATABASE: chess
            DB_USERNAME: chess
            DB_PASSWORD: secret

            SESSION_DRIVER: database
            CACHE_STORE: database
            QUEUE_CONNECTION: sync

            MAIL_MAILER: log
            MAIL_FROM_ADDRESS: noreply@chess.local
            MAIL_FROM_NAME: "Chess Engine"

            VITE_APP_NAME: "Chess Engine"
        depends_on:
            db:
                condition: service_healthy

    db:
        image: postgres:16-alpine
        environment:
            POSTGRES_DB: chess
            POSTGRES_USER: chess
            POSTGRES_PASSWORD: secret
        ports:
            - "5432:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U chess"]
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    pgdata:
